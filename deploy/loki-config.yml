# Minimal single-binary Loki config for local loglens demos.
# Not production-tuned: filesystem storage, no auth, accepts old samples so
# you can ship historical log files without timestamp-rejection friction.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Allow ingesting historical / out-of-order log files for triage demos.
  reject_old_samples: false
  reject_old_samples_max_age: 8760h
  unordered_writes: true
  allow_structured_metadata: true

ruler:
  alertmanager_url: http://localhost:9093
