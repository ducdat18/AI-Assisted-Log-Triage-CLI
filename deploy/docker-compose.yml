# One-command loglens stack. Profiles let you run just what you need:
#
#   # Everything (dashboard + local LLM + Grafana/Loki):
#   docker compose -f deploy/docker-compose.yml --profile all up -d
#   docker compose -f deploy/docker-compose.yml exec ollama ollama pull llama3.2
#   open http://localhost:8000   # loglens dashboard
#   open http://localhost:3000   # Grafana (loglens dashboard pre-loaded)
#
#   # Just the web dashboard:        --profile dashboard
#   # Dashboard + local LLM:         --profile dashboard --profile llm
#   # Just Grafana + Loki:           --profile observability
#
services:
  loglens:
    build:
      context: ..
      dockerfile: Dockerfile
    profiles: ["dashboard", "all"]
    ports:
      - "8000:8000"
    environment:
      LOGLENS_PROVIDER: ollama
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ../logs:/logs                  # drop your own logs here to browse/tail
      - ../sample_logs:/logs/samples:ro

  ollama:
    image: ollama/ollama:latest
    profiles: ["llm", "all"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  loki:
    image: grafana/loki:3.0.0
    profiles: ["observability", "all"]
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["observability", "all"]
    ports:
      - "3000:3000"
    environment:
      # Demo convenience only — do not use anonymous admin in production.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "lokiLogsDataplane"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  loki-data: {}
  ollama-data: {}
